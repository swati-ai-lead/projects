name: Deploy Waxing Agentic AI

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/pages-waxing.yml'
      - '02-intermediate-projects/waxing-agentic-ai/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-waxing
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site files
        run: |
          mkdir -p _site
          cp -R 02-intermediate-projects/waxing-agentic-ai/. _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
